<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Takip Paneli V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#eef2f7;
}

header{
background:#4f46e5;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:1100px;
margin:auto;
padding:12px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
gap:10px;
}

.grid2{
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
color:white;
}

.btnAdd{background:#10b981}
.btnEdit{background:#f59e0b}
.btnDelete{background:#ef4444}
.btnDetail{background:#3b82f6}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#f1f5f9;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.summary div{
background:#f8fafc;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<header>Personel Takip Paneli V3</header>

<div class="container">

<div class="card">

<h3>Dashboard</h3>

<div class="summary">

<div id="toplamPersonel">Personel:0</div>
<div id="toplamMaas">Maaş:0</div>
<div id="toplamMesai">Mesai:0</div>
<div id="toplamNet">Net:0</div>

</div>

<canvas id="chart"></canvas>
<canvas id="pie"></canvas>

</div>


<div class="card">

<h3>Personel Ekle</h3>

<div class="grid grid2">

<div>
<input id="ad" placeholder="Ad Soyad">
<input id="tel" placeholder="Telefon">
<input id="maas" type="number" placeholder="Temel Maaş">
</div>

<div>
<input id="mesaiUcret" type="number" placeholder="Mesai Saat Ücreti">
<input id="kesintiGun" type="number" placeholder="Devamsızlık Günlük Kesinti">
<button class="btnAdd" onclick="personelEkle()">Kaydet</button>
</div>

</div>

</div>


<div class="card">

<h3>İşlem Ekle</h3>

<select id="personelSec"></select>

<select id="islemTip">
<option value="mesai">Mesai</option>
<option value="avans">Avans</option>
<option value="dev">Devamsızlık</option>
</select>

<input id="deger" type="number" placeholder="Saat / Gün / Tutar">

<button class="btnDetail" onclick="islemEkle()">Kaydet</button>

</div>



<div class="card">

<h3>Personel Listesi</h3>

<input id="arama" placeholder="Ara" onkeyup="listeFiltre()">

<table>

<thead>
<tr>
<th>Ad</th>
<th>Telefon</th>
<th>Maaş</th>
<th>Mesai</th>
<th>Avans</th>
<th>Kesinti</th>
<th>Net</th>
<th>Detay</th>
<th>Sil</th>
</tr>
</thead>

<tbody id="liste"></tbody>

</table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("personel_v3")) || []

function TL(v){
return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY"}).format(v)
}

function kaydet(){
localStorage.setItem("personel_v3",JSON.stringify(data))
}

function personelEkle(){

let p={
ad:ad.value,
tel:tel.value,
maas:+maas.value||0,
mesaiUcret:+mesaiUcret.value||0,
kesGun:+kesintiGun.value||0,
mesai:0,
avans:0,
kes:0
}

data.push(p)

kaydet()
render()

}

function islemEkle(){

let i=personelSec.value
let tip=islemTip.value
let v=+deger.value||0

let p=data[i]

if(tip=="mesai") p.mesai+=v*p.mesaiUcret
if(tip=="avans") p.avans+=v
if(tip=="dev") p.kes+=v*p.kesGun

kaydet()
render()

}

function sil(i){

if(confirm("Silinsin mi")){
data.splice(i,1)
kaydet()
render()
}

}

function render(){

let html=""

let labels=[]
let maaslar=[]
let mesailer=[]
let netler=[]

let tMaas=0
let tMesai=0
let tNet=0

data.forEach((p,i)=>{

let net=p.maas+p.mesai-p.avans-p.kes

tMaas+=p.maas
tMesai+=p.mesai
tNet+=net

labels.push(p.ad)
maaslar.push(p.maas)
mesailer.push(p.mesai)
netler.push(net)

html+=`
<tr>
<td>${p.ad}</td>
<td><a href="tel:${p.tel}">${p.tel}</a></td>
<td>${TL(p.maas)}</td>
<td style="color:#10b981">${TL(p.mesai)}</td>
<td style="color:#f59e0b">${TL(p.avans)}</td>
<td style="color:#ef4444">${TL(p.kes)}</td>
<td><b>${TL(net)}</b></td>
<td><button class="btnDetail">Gör</button></td>
<td><button class="btnDelete" onclick="sil(${i})">Sil</button></td>
</tr>
`

})

liste.innerHTML=html

toplamPersonel.innerText="Personel: "+data.length
toplamMaas.innerText="Toplam Maaş: "+TL(tMaas)
toplamMesai.innerText="Toplam Mesai: "+TL(tMesai)
toplamNet.innerText="Toplam Net: "+TL(tNet)

personelSec.innerHTML=data.map((p,i)=>`<option value="${i}">${p.ad}</option>`).join("")

grafik(labels,maaslar,mesailer,netler)

}

let chart
let pie

function grafik(l,m,me,n){

if(chart) chart.destroy()
if(pie) pie.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:l,
datasets:[
{label:"Maaş",data:m},
{label:"Mesai",data:me},
{label:"Net",data:n}
]
}
})

pie=new Chart(document.getElementById("pie"),{
type:"pie",
data:{
labels:["Maaş","Mesai"],
datasets:[{data:[m.reduce((a,b)=>a+b,0),me.reduce((a,b)=>a+b,0)]}]
}
})

}

function listeFiltre(){

let q=arama.value.toLowerCase()

document.querySelectorAll("#liste tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(q)?"":"none"

})

}

render()

</script>

</body>
</html><div class="flex">
<button class="btn g" onclick="ekle()">Kaydet</button>
<button class="btn o hidden" id="updateBtn" onclick="update()">Güncelle</button>
</div>
</div>
</div>
</div>

<!-- İŞLEM EKLE -->
<div class="card">
<h3>İşlem Ekle</h3>
<div class="grid grid-2">
<div>
<select id="ps"></select>
<select id="tip">
  <option value="mesai">Mesai (saat)</option>
  <option value="avans">Avans (₺)</option>
  <option value="dev">Devamsızlık (gün)</option>
</select>
</div>
<div class="flex">
<input id="val" type="number" placeholder="Saat / Gün / Tutar">
<button class="btn b" onclick="islem()">Kaydet</button>
</div>
</div>
</div>

<!-- PERSONEL LİSTESİ -->
<div class="card">
<h3>Personel Listesi</h3>
<input id="search" placeholder="Ad veya telefon ara" onkeyup="filterList()">
<table>
<thead>
<tr>
<th>Ad</th><th>Telefon</th><th>Maaş</th><th>Mesai</th><th>Avans</th><th>Kesinti</th><th>Net</th><th>Detay</th><th>Düzenle</th><th>Sil</th>
</tr>
</thead>
<tbody id="liste"></tbody>
</table>
</div>

<!-- DETAY -->
<div id="detayBox" class="card hidden">
<h3 id="dAd">Detay</h3>
<div class="print-only" id="bordro"></div>
<table>
<thead>
<tr><th>Tarih</th><th>İşlem</th><th>Değer</th><th>Tutar</th></tr>
</thead>
<tbody id="hareket"></tbody>
</table>
<div class="flex no-print">
<button class="btn o" onclick="bordroYaz()">Bordro Yazdır</button>
<button class="btn p" onclick="kapatDetay()">Kapat</button>
</div>
</div>

</div></div>

<script>
let USER="admin", PASS=localStorage.getItem("ptp_pass")||"1234";
let data=JSON.parse(localStorage.getItem("ptp_v2"))||[];
let editIndex = null;
let dashboardChart = null, pieChart=null;

function save(){localStorage.setItem("ptp_v2",JSON.stringify(data));}
function qs(id){return document.getElementById(id)}

function login(){
  if(qs("u").value===USER && qs("p").value===PASS){
    qs("loginBox").classList.add("hidden");
    qs("app").classList.remove("hidden");
    render();
  }else{
    qs("lmsg").innerText="Hatalı kullanıcı veya şifre";
  }
}

function ekle(){
  const p={id: Date.now(), ad:qs("ad").value, tel:qs("tel").value, maas:+qs("maas").value||0, mu:+qs("mucret").value||0, gk:+qs("gkes").value||0, mesai:0,avans:0,kes:0,h:[]};
  if(!p.ad) return alert("Ad girin");
  data.push(p); save(); render(); clearForm();
}
function clearForm(){["ad","tel","maas","mucret","gkes"].forEach(i=>qs(i).value="");qs("updateBtn").classList.add("hidden");editIndex=null;}
function edit(i){const p=data[i];qs("ad").value=p.ad;qs("tel").value=p.tel;qs("maas").value=p.maas;qs("mucret").value=p.mu;qs("gkes").value=p.gk;qs("updateBtn").classList.remove("hidden");editIndex=i;}
function update(){if(editIndex===null) return;const p=data[editIndex];p.ad=qs("ad").value;p.tel=qs("tel").value;p.maas=+qs("maas").value||0;p.mu=+qs("mucret").value||0;p.gk=+qs("gkes").value||0;save(); render(); clearForm();}
function islem(){const i=+qs("ps").value, tip=qs("tip").value, v=+qs("val").value||0;const p=data[i]; if(!p) return; let tut=0;if(tip==="mesai"){tut=v*p.mu;p.mesai+=tut;} if(tip==="avans"){tut=v;p.avans+=tut;} if(tip==="dev"){tut=v*p.gk;p.kes+=tut;} p.h.push({t:new Date().toLocaleString(), tip, v, tut}); save(); render(); qs("val").value="";}
function sil(i){if(confirm("Silinsin mi?")){data.splice(i,1); save(); render();}}
function detay(i){const p=data[i]; if(!p) return; qs("detayBox").classList.remove("hidden"); qs("dAd").innerText=p.ad+" - Hareketler"; let h=""; p.h.forEach(x=>{const tag=x.tip==="mesai"?"m":(x.tip==="avans"?"a":"d"); h+=`<tr><td>${x.t}</td><td><span class="tag ${tag}">${x.tip}</span></td><td>${x.v}</td><td>${x.tut}</td></tr>`}); qs("hareket").innerHTML=h||"<tr><td colspan=4>Kayıt yok</td></tr>"; const net=p.maas+p.mesai-p.avans-p.kes; qs("bordro").innerHTML=`<h2>Maaş Bordrosu</h2><p><b>Ad:</b> ${p.ad}</p><p><b>Temel Maaş:</b> ${p.maas}</p><p><b>Mesai:</b> ${p.mesai}</p><p><b>Avans:</b> ${p.avans}</p><p><b>Kesinti:</b> ${p.kes}</p><h3>NET: ${net}</h3>`;}
function kapatDetay(){qs("detayBox").classList.add("hidden");}
function bordroYaz(){const w=window.open("","_blank"); w.document.write(`<html><head><title>Bordro</title><style>body{font-family:Arial;padding:20px;}h2,h3,p{margin:8px 0;}table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #000;padding:6px;text-align:center;}</style></head><body>${qs("bordro").innerHTML}</body></html>`); w.print(); w.close();}

function render(){
  qs("ps").innerHTML=data.map((p,i)=>`<option value="${i}">${p.ad}</option>`).join("");
  let html="", tma=0,tme=0,tn=0;
  const labels=[], maaşlar=[], mesailer=[], netler=[];
  let toplamM=0, toplamMes=0, toplamAv=0, toplamKes=0;
  data.forEach((p,i)=>{
    const net=p.maas+p.mesai-p.avans-p.kes;
    tma+=p.maas; tme+=p.mesai; tn+=net;
    labels.push(p.ad); maaşlar.push(p.maas); mesailer.push(p.mesai); netler.push(net);
    toplamM+=p.maas; toplamMes+=p.mesai; toplamAv+=p.avans; toplamKes+=p.kes;
    html+=`<tr><td>${p.ad}</td><td>${p.tel||""}</td><td>${p.maas}</td><td style="color:#10b981">${p.mesai}</td><td style="color:#f59e0b">${p.avans}</td><td style="color:#ef4444">${p.kes}</td><td><b>${net}</b></td><td><button class="btn b" onclick="detay(${i})">Gör</button></td><td><button class="btn o" onclick="edit(${i})">Düzenle</button></td><td><button class="btn r" onclick="sil(${i})">Sil</button></td></tr>`;
  });
  qs("liste").innerHTML=html||"<tr><td colspan=10>Kayıt yok</td></tr>";
  qs("kisi").innerText="Personel: "+data.length;
  qs("tmaas").innerText="Toplam Maaş: "+tma;
  qs("tmesai").innerText="Toplam Mesai: "+tme;
  qs("tnet").innerText="Toplam Net: "+tn;

  if(dashboardChart) dashboardChart.destroy();
  const ctx=document.getElementById('dashboardChart').getContext('2d');
  dashboardChart=new Chart(ctx,{type:'bar',data:{labels, datasets:[{label:'Maaş', data:maaşlar, backgroundColor:'#10b981'},{label:'Mesai', data:mesailer, backgroundColor:'#3b82f6'},{label:'Net', data:netler, backgroundColor:'#f59e0b'}]},options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}});
  
  if(pieChart) pieChart.destroy();
  const ctx2=document.getElementById('pieChart').getContext('2d');
  pieChart=new Chart(ctx2,{type:'pie',data:{labels:['Toplam Maaş','Toplam Mesai','Toplam Avans','Toplam Kesinti'],datasets:[{data:[toplamM,toplamMes,toplamAv,toplamKes],backgroundColor:['#10b981','#3b82f6','#f59e0b','#ef4444']}]},options:{responsive:true}});
}

function filterList(){const q=qs("search").value.toLowerCase();document.querySelectorAll("#liste tr").forEach(r=>r.style.display=r.innerText.toLowerCase().includes(q)?"":"none");}
</script>
</body>

</html>
